<h1>Pokemon List</h1>
<input
  #input
  (keyup.enter)="selectPokemon(input.value) "
  type="number"
  />

<p *ngIf="pokemonSelected">
  You selected the Pokémon: {{ pokemonSelected?.name }}
</p>
<p *ngIf="!pokemonSelected">
  No Pokémon selected yet. Please choose a Pokémon.
</p>
<p *ngFor="let pokemon of pokemonList">{{pokemon.name}}</p>
